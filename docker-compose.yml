services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3737:3737"
    environment:
      - NODE_ENV=development
      - PORT=3737
      - DATA_DIR=/data
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3737/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
